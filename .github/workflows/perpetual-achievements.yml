name: Achievement God Mode
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  prestige-harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Heartbeat
        run: |
          git config --global user.name "mirsydfchrynto"
          git config --global user.email "irsydfchrynto@gmail.com"
          echo "$(date)" >> HEARTBEAT.md
          git add HEARTBEAT.md
          git commit -m "chore: heartbeat" || exit 0
          git push
      - name: PR Farm
        run: |
          BRANCH="farm-$(date +%s)"
          git checkout -b $BRANCH
          echo "Log" >> ACHIEVEMENTS.md
          git add ACHIEVEMENTS.md
          git commit -m "feat: farm"
          git push origin $BRANCH
          PR_URL=$(gh pr create --title "Farm" --body "Farm" --head $BRANCH)
          gh pr merge $PR_URL --merge --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
