<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .container {
      fill: #0d1117;
      stroke: #30363d;
    }
    .header-text {
      fill: #0070f3;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 14px;
    }
    .skill-name {
      fill: #8b949e;
      font-family: sans-serif;
      font-size: 12px;
    }
    .bar-bg {
      fill: #161b22;
    }
    .bar-fill {
      fill: #0070f3;
    }
    .badge-bg {
      fill: #238636;
    }
    .badge-text {
      fill: #ffffff;
      font-family: sans-serif;
      font-size: 10px;
      font-weight: bold;
    }
    @keyframes grow {
      from { width: 0; }
    }
    .anim-grow {
      animation: grow 2s ease-out forwards;
    }
  </style>

  <rect width="800" height="300" class="container" rx="8"/>
  <text x="20" y="35" class="header-text">SYSTEM_CAPABILITIES_REPORT [LIVE]</text>
  <line x1="20" y1="45" x2="780" y2="45" stroke="#30363d" stroke-width="1"/>

  <!-- Skill 1 -->
  <text x="20" y="80" class="skill-name">FLUTTER / DART</text>
  <rect x="180" y="70" width="500" height="12" class="bar-bg" rx="6"/>
  <rect x="180" y="70" width="475" height="12" class="bar-fill anim-grow" rx="6"/>
  <rect x="700" y="68" width="80" height="16" class="badge-bg" rx="8"/>
  <text x="740" y="80" text-anchor="middle" class="badge-text">OPTIMIZED</text>

  <!-- Skill 2 -->
  <text x="20" y="120" class="skill-name">SOFTWARE ARCHITECTURE</text>
  <rect x="180" y="110" width="500" height="12" class="bar-bg" rx="6"/>
  <rect x="180" y="110" width="450" height="12" class="bar-fill anim-grow" rx="6"/>
  <rect x="700" y="108" width="80" height="16" class="badge-bg" rx="8"/>
  <text x="740" y="120" text-anchor="middle" class="badge-text">SCALING</text>

  <!-- Skill 3 -->
  <text x="20" y="160" class="skill-name">KOTLIN / NATIVE</text>
  <rect x="180" y="150" width="500" height="12" class="bar-bg" rx="6"/>
  <rect x="180" y="150" width="425" height="12" class="bar-fill anim-grow" rx="6"/>
  <rect x="700" y="148" width="80" height="16" class="badge-bg" rx="8" style="fill: #8957e5;"/>
  <text x="740" y="160" text-anchor="middle" class="badge-text">STABLE</text>

  <!-- Skill 4 -->
  <text x="20" y="200" class="skill-name">NEXT.JS / TS</text>
  <rect x="180" y="190" width="500" height="12" class="bar-bg" rx="6"/>
  <rect x="180" y="190" width="400" height="12" class="bar-fill anim-grow" rx="6"/>
  <rect x="700" y="188" width="80" height="16" class="badge-bg" rx="8" style="fill: #8957e5;"/>
  <text x="740" y="200" text-anchor="middle" class="badge-text">STABLE</text>

  <text x="20" y="260" class="skill-name" style="fill: #484f58;">CORE_INTEGRITY: 100% | SYSTEM_STATUS: ONLINE | DEPLOYMENT_READY: YES</text>
</svg>
