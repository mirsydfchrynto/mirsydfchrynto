<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background: #0d1117;
          color: #c9d1d9;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          padding: 20px;
          border-radius: 8px;
          border: 1px solid #30363d;
          height: 260px;
        }
        .header {
          color: #f43f5e;
          font-weight: bold;
          font-size: 14px;
          margin-bottom: 15px;
          border-bottom: 1px solid #30363d;
          padding-bottom: 5px;
        }
        .skill-row {
          display: flex;
          align-items: center;
          margin-bottom: 10px;
        }
        .skill-name {
          width: 150px;
          font-size: 12px;
          color: #8b949e;
        }
        .skill-bar-bg {
          flex-grow: 1;
          height: 8px;
          background: #161b22;
          border-radius: 4px;
          position: relative;
        }
        .skill-bar-fill {
          height: 100%;
          background: #f43f5e;
          border-radius: 4px;
          transition: width 2s ease-in-out;
        }
        @keyframes grow-95 { from { width: 0; } to { width: 95%; } }
        @keyframes grow-90 { from { width: 0; } to { width: 90%; } }
        @keyframes grow-85 { from { width: 0; } to { width: 85%; } }
        @keyframes grow-80 { from { width: 0; } to { width: 80%; } }
        
        .bar-95 { animation: grow-95 2s forwards; }
        .bar-90 { animation: grow-90 2s forwards; }
        .bar-85 { animation: grow-85 2s forwards; }
        .bar-80 { animation: grow-80 2s forwards; }
        
        .status-badge {
          display: inline-block;
          padding: 2px 8px;
          border-radius: 10px;
          font-size: 10px;
          background: #238636;
          color: white;
          margin-left: 10px;
        }
      </style>
      <div class="container">
        <div class="header">SYSTEM_CAPABILITIES_REPORT [LIVE]</div>
        <div class="skill-row">
          <div class="skill-name">FLUTTER / DART</div>
          <div class="skill-bar-bg"><div class="skill-bar-fill bar-95"></div></div>
          <div class="status-badge">OPTIMIZED</div>
        </div>
        <div class="skill-row">
          <div class="skill-name">SOFTWARE ARCHITECTURE</div>
          <div class="skill-bar-bg"><div class="skill-bar-fill bar-90"></div></div>
          <div class="status-badge">SCALING</div>
        </div>
        <div class="skill-row">
          <div class="skill-name">KOTLIN / NATIVE</div>
          <div class="skill-bar-bg"><div class="skill-bar-fill bar-85"></div></div>
          <div class="status-badge">STABLE</div>
        </div>
        <div class="skill-row">
          <div class="skill-name">NEXT.JS / TS</div>
          <div class="skill-bar-bg"><div class="skill-bar-fill bar-80"></div></div>
          <div class="status-badge">STABLE</div>
        </div>
        <div class="skill-row" style="margin-top: 20px; font-size: 11px; color: #8b949e;">
          CORE_INTEGRITY: 100% | SYSTEM_STATUS: ONLINE | DEPLOYMENT_READY: YES
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
