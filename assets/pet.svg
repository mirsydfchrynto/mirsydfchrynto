<svg fill="none" viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,0; 0,10; -10,0; 0,0" dur="5s" repeatCount="indefinite" />
    
    <!-- Body -->
    <rect x="70" y="80" width="60" height="40" rx="10" fill="#0d1117" stroke="#0070f3" stroke-width="2">
       <animate attributeName="height" values="40;45;40" dur="1s" repeatCount="indefinite" />
    </rect>
    
    <!-- Eyes -->
    <circle cx="90" cy="100" r="3" fill="#0070f3">
      <animate attributeName="r" values="3;1;3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="110" cy="100" r="3" fill="#0070f3">
      <animate attributeName="r" values="3;1;3" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Antennas -->
    <line x1="85" y1="80" x2="75" y2="60" stroke="#0070f3" stroke-width="2" />
    <line x1="115" y1="80" x2="125" y2="60" stroke="#0070f3" stroke-width="2" />
    
    <text x="100" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">SDA_DAEMON</text>
  </g>
</svg>
