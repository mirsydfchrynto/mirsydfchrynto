<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#0d1117" rx="12"/>
  
  <!-- Animated Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e">
        <animate attributeName="stop-color" values="#f43f5e;#fb7185;#f43f5e" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#fb7185">
        <animate attributeName="stop-color" values="#fb7185;#f43f5e;#fb7185" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#grid)" />
  
  <!-- Scanning Line -->
  <rect width="800" height="1" fill="#f43f5e" opacity="0.5">
    <animate attributeName="y" values="0;200;0" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Main Title -->
  <text x="50%" y="45%" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="url(#textGrad)">
    THE_ARCHITECT.EXE
  </text>
  
  <!-- Subtitle with Typewriter effect (simulated via opacity) -->
  <text x="50%" y="65%" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e">
    INITIALIZING_MOBILE_SYSTEMS_RESEARCH...
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </text>

  <!-- Animated Border -->
  <rect x="10" y="10" width="780" height="180" rx="10" stroke="#f43f5e" stroke-width="1" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="0" to="100" dur="10s" repeatCount="indefinite" />
  </rect>
</svg>
