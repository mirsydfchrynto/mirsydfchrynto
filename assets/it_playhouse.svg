<svg fill="none" viewBox="0 0 800 250" width="800" height="250" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="250" fill="#0d1117" rx="12" stroke="#30363d"/>
  
  <style>
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes drift { 
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }
    @keyframes binary {
      0% { content: "01001001"; }
      25% { content: "10100111"; }
      50% { content: "01101101"; }
      75% { content: "11001010"; }
      100% { content: "01001001"; }
    }
    .code-text { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 12px; }
    .cmd { fill: #0070f3; font-weight: bold; }
    .output { fill: #c9d1d9; }
    .cursor { fill: #0070f3; animation: blink 1s infinite; }
    .binary-stream { fill: #161b22; font-family: monospace; font-size: 10px; }
    .window-dot { r: 5; }
  </style>

  <!-- Background Binary Stream (Playful IT Element) -->
  <text x="20" y="40" class="binary-stream">101001010101001010101010010101010101001010101010010101010101001010101010010101010101001010101010010101010101001</text>
  <text x="20" y="230" class="binary-stream">0110110101101101011011010110110101101101011011010110110101101101011011010110110101101101011011010110110101101101</text>

  <!-- Terminal Header -->
  <rect width="800" height="30" fill="#161b22" rx="12"/>
  <circle cx="20" cy="15" class="window-dot" fill="#ff5f56"/>
  <circle cx="40" cy="15" class="window-dot" fill="#ffbd2e"/>
  <circle cx="60" cy="15" class="window-dot" fill="#27c93f"/>
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">mirsydfchrynto@kernel-core: /dev/brain</text>

  <!-- Playful IT Interface -->
  <g transform="translate(30, 60)">
    <text y="0" class="code-text"><tspan class="cmd"># whoami</tspan></text>
    <text y="20" class="code-text output">Software Architect in Training | Problem Solver by Habit</text>
    
    <text y="50" class="code-text"><tspan class="cmd"># locate --interest</tspan></text>
    <text y="70" class="code-text output">/mnt/linux_customization/liquid_glass_v4.0</text>
    <text y="85" class="code-text output">/usr/bin/flutter_high_integrity_testing</text>
    
    <text y="115" class="code-text"><tspan class="cmd"># fetch --vibe</tspan></text>
    <rect x="0" y="125" width="200" height="40" fill="#161b22" rx="4" stroke="#30363d"/>
    <text x="10" y="142" class="code-text" fill="#0070f3">Status:</text>
    <text x="70" y="142" class="code-text output">Hungry for Innovation</text>
    <text x="10" y="157" class="code-text" fill="#0070f3">Mood:</text>
    <text x="70" y="157" class="code-text output">Coffee -> Code Pipeline Active</text>
    
    <text y="185" class="code-text"><tspan class="cmd"># tail -f /var/log/dreams</tspan></text>
    <text y="205" class="code-text output">> Constructing scalable foundations...</text>
    <rect x="250" y="193" width="8" height="15" class="cursor"/>
  </g>

  <!-- Visual Informatics Decor (Playful Logic Gates) -->
  <g transform="translate(600, 80)" stroke="#30363d" fill="none">
    <path d="M0,0 h30 q10,0 10,20 t10,20 h30" stroke="#0070f3">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite" />
    </path>
    <circle cx="85" cy="40" r="15" stroke="#0070f3" fill="#161b22"/>
    <text x="85" y="44" text-anchor="middle" fill="#0070f3" font-size="10" font-family="monospace">AND</text>
    <text x="60" y="-10" class="code-text" font-size="9">LOGIC_GATE_01</text>
  </g>
</svg>
