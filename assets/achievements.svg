<svg fill="none" viewBox="0 0 800 220" width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="220" fill="#0d1117" rx="12" stroke="#30363d"/>
  
  <style>
    .stat-label { fill: #8b949e; font-family: monospace; font-size: 11px; text-transform: uppercase; }
    .stat-value { fill: #f43f5e; font-family: monospace; font-size: 22px; font-weight: bold; }
    .stat-desc { fill: #c9d1d9; font-family: sans-serif; font-size: 12px; }
    .card { fill: #161b22; stroke: #30363d; }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .anim { animation: slideIn 0.8s ease-out forwards; }
  </style>

  <!-- Title -->
  <text x="20" y="35" font-family="monospace" font-size="14" font-weight="bold" fill="#f43f5e">ARCHITECTURE_PRODUCTION_METRICS [DATA_SYNC]</text>
  <line x1="20" y1="45" x2="780" y2="45" stroke="#30363d" stroke-width="1"/>

  <!-- Metric 1: Flutter Tests -->
  <g transform="translate(20, 70)" class="anim" style="animation-delay: 0.1s;">
    <rect width="240" height="120" rx="8" class="card"/>
    <text x="20" y="30" class="stat-label">Production Stability</text>
    <text x="20" y="60" class="stat-value">180+ VERIFIED</text>
    <text x="20" y="90" class="stat-desc">Unit & Widget Tests Passed</text>
    <rect x="20" y="100" width="200" height="4" fill="#30363d" rx="2"/>
    <rect x="20" y="100" width="190" height="4" fill="#f43f5e" rx="2"/>
  </g>

  <!-- Metric 2: Academic GPA -->
  <g transform="translate(280, 70)" class="anim" style="animation-delay: 0.3s;">
    <rect width="240" height="120" rx="8" class="card"/>
    <text x="20" y="30" class="stat-label">Academic Excellence</text>
    <text x="20" y="60" class="stat-value">3.92 / 4.00</text>
    <text x="20" y="90" class="stat-desc">D4 Teknik Informatika Score</text>
    <rect x="20" y="100" width="200" height="4" fill="#30363d" rx="2"/>
    <rect x="20" y="100" width="196" height="4" fill="#f43f5e" rx="2"/>
  </g>

  <!-- Metric 3: Optimization -->
  <g transform="translate(540, 70)" class="anim" style="animation-delay: 0.5s;">
    <rect width="240" height="120" rx="8" class="card"/>
    <text x="20" y="30" class="stat-label">Database Efficiency</text>
    <text x="20" y="60" class="stat-value">70% OPTIMIZED</text>
    <text x="20" y="90" class="stat-desc">Firestore Query Restructuring</text>
    <rect x="20" y="100" width="200" height="4" fill="#30363d" rx="2"/>
    <rect x="20" y="100" width="140" height="4" fill="#f43f5e" rx="2"/>
  </g>
</svg>
