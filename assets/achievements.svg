<svg fill="none" viewBox="0 0 800 150" width="800" height="150" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="150" fill="#0d1117" rx="12" />
  
  <style>
    .badge { transition: transform 0.3s; }
    .badge:hover { transform: scale(1.1); }
    .title { fill: #f43f5e; font-family: monospace; font-size: 14px; font-weight: bold; }
    .subtitle { fill: #8b949e; font-family: monospace; font-size: 10px; }
  </style>

  <!-- Achievement 1: Flutter -->
  <g class="badge" transform="translate(100, 75)">
    <circle r="40" fill="#161b22" stroke="#f43f5e" stroke-width="2" />
    <path d="M-15,-15 L15,0 L-15,15 L0,0 Z" fill="#f43f5e" />
    <text y="60" text-anchor="middle" class="title">FLUTTER_ELITE</text>
    <text y="75" text-anchor="middle" class="subtitle">180+ TESTS PASSED</text>
  </g>

  <!-- Achievement 2: GPA -->
  <g class="badge" transform="translate(300, 75)">
    <circle r="40" fill="#161b22" stroke="#f43f5e" stroke-width="2" />
    <text x="0" y="8" text-anchor="middle" font-size="20" fill="#f43f5e" font-family="monospace">3.92</text>
    <text y="60" text-anchor="middle" class="title">ACADEMIC_ARCHITECT</text>
    <text y="75" text-anchor="middle" class="subtitle">GPA PERFORMANCE</text>
  </g>

  <!-- Achievement 3: Architecture -->
  <g class="badge" transform="translate(500, 75)">
    <circle r="40" fill="#161b22" stroke="#f43f5e" stroke-width="2" />
    <path d="M-15,10 L0,-20 L15,10 Z M-10,15 L10,15" stroke="#f43f5e" stroke-width="2" />
    <text y="60" text-anchor="middle" class="title">SOLID_ENGINEER</text>
    <text y="75" text-anchor="middle" class="subtitle">CLEAN ARCHITECTURE</text>
  </g>

  <!-- Achievement 4: Linux -->
  <g class="badge" transform="translate(700, 75)">
    <circle r="40" fill="#161b22" stroke="#f43f5e" stroke-width="2" />
    <path d="M-10,0 Q0,-20 10,0 T0,20 T-10,0" fill="#f43f5e" />
    <text y="60" text-anchor="middle" class="title">KERNEL_OPS</text>
    <text y="75" text-anchor="middle" class="subtitle">LINUX CUSTOMIZATION</text>
  </g>
</svg>
