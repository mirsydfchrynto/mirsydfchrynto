<svg fill="none" viewBox="0 0 800 250" width="800" height="250" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="250" fill="#0d1117" rx="10" stroke="#30363d"/>
  
  <!-- Terminal Header -->
  <rect width="800" height="30" fill="#161b22" rx="10"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="15" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="15" r="5" fill="#27c93f"/>
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">mirsydfchrynto@architect: ~</text>

  <!-- Terminal Content -->
  <g font-family="monospace" font-size="14">
    <text x="20" y="60" fill="#0070f3">> system_check --status</text>
    <text x="20" y="85" fill="#c9d1d9"> [LOAD] Initializing Mobile Core...</text>
    <text x="20" y="110" fill="#27c93f"> [OK] Flutter Framework (Optimized)</text>
    <text x="20" y="135" fill="#27c93f"> [OK] Software Architecture (Standard: SOLID)</text>
    <text x="20" y="160" fill="#27c93f"> [OK] Native Interop (Kotlin/Android)</text>
    
    <text x="20" y="195" fill="#0070f3">> uptime</text>
    <text x="20" y="220" fill="#c9d1d9"> 21 years | 6 semesters | 3.92 GPA_SCORE</text>
    
    <!-- Cursor Animation -->
    <rect x="360" y="205" width="10" height="20" fill="#0070f3">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
