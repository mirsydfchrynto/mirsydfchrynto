<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 0h800v300H0z" fill="#000"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="300" fill="url(#grid)" />
  <g opacity="0.4">
    <circle cx="200" cy="150" r="100" fill="#0070f3" filter="blur(80px)">
      <animate attributeName="cx" values="200;600;200" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="150" r="80" fill="#3b82f6" filter="blur(80px)">
      <animate attributeName="cx" values="600;200;600" dur="25s" repeatCount="indefinite" />
    </circle>
  </g>
  <text x="50%" y="45%" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#fff" letter-spacing="-0.04em">MUHAMMAD IRSYAD</text>
  <text x="50%" y="60%" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#666" letter-spacing="0.4em" font-weight="500">SYSTEM ARCHITECT // PRODUCT ENGINEER</text>
  <rect x="250" y="190" width="300" height="1" fill="#fff" opacity="0.2">
    <animate attributeName="width" values="0;300;0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x" values="400;250;400" dur="4s" repeatCount="indefinite" />
  </rect>
  <path d="M10 10 L30 10 M10 10 L10 30" stroke="#333" stroke-width="2"/>
  <path d="M770 10 L790 10 M790 10 L790 30" stroke="#333" stroke-width="2"/>
  <path d="M10 270 L10 290 M10 290 L30 290" stroke="#333" stroke-width="2"/>
  <path d="M790 270 L790 290 M790 290 L770 290" stroke="#333" stroke-width="2"/>
</svg>
